<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    td{
        background-color:  rgb(178, 178, 178);
    }
    table{
        border-color: gray;
    }
    table td{
        font-weight: 3px;
    }
</style>
<body>
    <table border="7px solid black" style="text-align: center;">
        <tr>
        <th colspan="11">Calculator</th>
        </tr>

        <tr>
            <td>1</td>
            <td colspan="10" style="text-align: right;">0</td>
            
        </tr>

        <tr>
            <td style="background-color: rgb(178, 178, 178);">Mod</td>
             <td colspan="5" style="text-align: left;">
                <label for="">deg</label>
                <input type="radio">
                <label for="">rad</label>
                <input type="radio">
            </td>
            
                  <td >MC</td>
                   <td>MR</td>
                    <td>MS</td>
                     <td>M+</td>
                     <td>-M</td>
                  
        </tr>

        <tr>
          
                     <td>Sinh</td>
                     <td>cosh</td>
                     <td>tanh</td>
                     <td>Exp</td>
                     <td>( </td>
                     <td>)</td>
                     <td colspan="2" style="background-color: red;"><-</td>
                     <td style="background-color: red;">C</td>
                     <td style="background-color: red;" >+/-</td>
                     <td>✓</td>
                   
                  
        </tr>

        <tr>
          
                     <td>Sinh<sup>-1</sup></td>
                     <td>cosh<sup>-1</sup></td>
                     <td>tanh<sup>-1</sup></td>
                     <td>log<sub>2</sub>x</td>
                     <td>In</td>
                     <td>Log</td>
                     <td>7</td>
                     <td>8</td>
                     <td>9</td>
                     <td>/</td>
                     <td>%</td>
                    
                  
        </tr>


        <tr>
          
                     <td>π</td>
                     <td>e</td>
                     <td>n!</td>
                     <td>log<sub>y</sub>x</td>
                     <td>e<sup>x</sup></td>
                     <td>10<sup>x</sup></td>
                     <td>4</td>
                     <td>5</td>
                     <td>6</td>
                     <td>*</td>
                     <td>1/x</td>
                    
                  
        </tr>

         <tr>
          
                     <td>Sin</td>
                     <td>cos</td>
                     <td>tan</td>
                     <td>x<sup>y</sup></td>
                     <td>x<sup>3</sup></td>
                     <td>x<sup>2</sup></td>
                     <td>1</td>
                     <td>2</td>
                     <td>3</td>
                     <td>-</td>
                     <td rowspan="2" style="background-color: rgb(19, 162, 19);">=</td>
                    
                  
        </tr>
       
        <tr>
          
                     <td>Sin<sup>-1</sup></td>
                     <td>cos<sup>-1</sup></td>
                     <td>tan<sup>-1</sup></td>
                     <td>y<sub>✓</sub></td>
                     <td>3<sub>✓</sub></td>
                     <td>|x|</td>
                     <td colspan="2">0</td>
                     <td>.</td>
                     <td>+</td>
                   
                    
                  
        </tr>
       
       
       


        













    </table>
</body>
</html>
